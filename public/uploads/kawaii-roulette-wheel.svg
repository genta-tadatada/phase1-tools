<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- ルーレットツール用：子ども向け回転盤（カジノ感を出さないパステル円盤） -->
  <!-- 外周リング -->
  <circle cx="100" cy="108" r="74" fill="#ffffff"/>
  <circle cx="100" cy="108" r="74" fill="none" stroke="#fbcfe8" stroke-width="8"/>
  <!-- 6分割の扇（ブランド4色＋サブ2色） -->
  <g>
    <path d="M100 108 L100 38 A70 70 0 0 1 160.6 73 Z" fill="#f9a8d4"/>
    <path d="M100 108 L160.6 73 A70 70 0 0 1 160.6 143 Z" fill="#fde68a"/>
    <path d="M100 108 L160.6 143 A70 70 0 0 1 100 178 Z" fill="#6ee7b7"/>
    <path d="M100 108 L100 178 A70 70 0 0 1 39.4 143 Z" fill="#c4b5fd"/>
    <path d="M100 108 L39.4 143 A70 70 0 0 1 39.4 73 Z" fill="#a7f3d0"/>
    <path d="M100 108 L39.4 73 A70 70 0 0 1 100 38 Z" fill="#fbcfe8"/>
  </g>
  <!-- 中央ハブ -->
  <circle cx="100" cy="108" r="18" fill="#ffffff"/>
  <circle cx="100" cy="108" r="18" fill="none" stroke="#c4b5fd" stroke-width="5"/>
  <circle cx="100" cy="108" r="6" fill="#f9a8d4"/>
  <!-- 上のポインター（針） -->
  <path d="M100 20 L112 42 L88 42 Z" fill="#8b5cf6"/>
  <!-- まわりのキラキラ -->
  <path d="M168 30 L171 38 L179 41 L171 44 L168 52 L165 44 L157 41 L165 38 Z" fill="#fde68a"/>
  <circle cx="26" cy="50" r="4" fill="#f9a8d4"/>
</svg>
