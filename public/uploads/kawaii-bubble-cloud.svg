<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" fill="none">
  <defs>
    <radialGradient id="bubCloudGrad" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e0d5ff"/>
      <stop offset="100%" stop-color="#b8a4ff"/>
