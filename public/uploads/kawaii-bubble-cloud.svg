    <circle cx="170" cy="75" r="36"/>
    <circle cx="195" cy="105" r="28"/>
    <circle cx="155" cy="125" r="32"/>
    <circle cx="100" cy="125" r="34"/>
    <circle cx="55" cy="115" r="26"/>
