<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <!-- 背景 -->
  <rect width="300" height="300" fill="#0d1428"/>
  <!-- 中央の主軸ライン（斜めグラデーション） -->
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a849" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f0d27a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d4a849" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <line x1="40" y1="260" x2="260" y2="40" stroke="url(#goldGrad)" stroke-width="2"/>
  <line x1="55" y1="265" x2="265" y2="55" stroke="url(#goldGrad)" stroke-width="1"/>
  <line x1="35" y1="245" x2="245" y2="35" stroke="url(#goldGrad)" stroke-width="1.5"/>
  <!-- 金色の粒（大小ランダム配置） -->
  <g fill="#f0d27a">
    <circle cx="60" cy="240" r="1.5"/>
    <circle cx="75" cy="225" r="1"/>
    <circle cx="90" cy="220" r="2"/>
    <circle cx="105" cy="200" r="1"/>
    <circle cx="120" cy="195" r="1.5"/>
    <circle cx="135" cy="175" r="2.5"/>
    <circle cx="150" cy="160" r="1"/>
    <circle cx="165" cy="145" r="1.5"/>
    <circle cx="180" cy="135" r="2"/>
    <circle cx="195" cy="115" r="1"/>
    <circle cx="210" cy="100" r="1.5"/>
    <circle cx="225" cy="85" r="2"/>
    <circle cx="240" cy="70" r="1"/>
    <!-- 外側の散らばり -->
    <circle cx="70" cy="200" r="1"/>
    <circle cx="95" cy="180" r="1"/>
    <circle cx="130" cy="210" r="1"/>
    <circle cx="155" cy="120" r="1"/>
    <circle cx="170" cy="180" r="1"/>
    <circle cx="200" cy="155" r="1.5"/>
    <circle cx="220" cy="135" r="1"/>
    <circle cx="50" cy="220" r="1"/>
    <circle cx="245" cy="100" r="1.5"/>
  </g>
  <!-- 4方向に伸びる小さな光線 -->
  <g stroke="#f0d27a" stroke-width="0.8" stroke-linecap="round" opacity="0.7">
    <line x1="135" y1="170" x2="135" y2="180"/>
    <line x1="180" y1="130" x2="180" y2="140"/>
    <line x1="90" y1="215" x2="90" y2="225"/>
    <line x1="225" y1="80" x2="225" y2="90"/>
  </g>
</svg>
