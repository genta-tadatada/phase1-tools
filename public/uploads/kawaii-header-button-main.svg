    <path d="M0 -10 L2.5 -2.5 L10 0 L2.5 2.5 L0 10 L-2.5 2.5 L-10 0 L-2.5 -2.5 Z"/>
    <circle cx="9" cy="-8" r="1.5"/>
  </g>
  <!-- テキスト -->
  <text x="140" y="58" font-family="'Hiragino Maru Gothic ProN', 'M PLUS Rounded 1c', sans-serif"
        font-weight="700" font-size="20" fill="#ffffff" text-anchor="middle">使ってみる</text>
  <!-- 右矢印 -->
  <path d="M225 50 L235 50 M231 45 L235 50 L231 55"
        stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
