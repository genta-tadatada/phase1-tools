<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100" fill="none">
  <defs>
    <linearGradient id="btnBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6cb9ff"/>
      <stop offset="100%" stop-color="#3a8ee6"/>
    </linearGradient>
    <filter id="btnShadow1" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#3a8ee6" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect x="20" y="20" width="240" height="60" rx="30" fill="url(#btnBlue)" filter="url(#btnShadow1)"/>
  <!-- ハイライト -->
  <rect x="35" y="28" width="210" height="14" rx="7" fill="#ffffff" opacity="0.25"/>
  <!-- キラキラアイコン -->
