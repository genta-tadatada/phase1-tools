<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- ランダム数字ツール用：転がるサイコロ2個 -->
  <!-- 影 -->
  <ellipse cx="100" cy="166" rx="58" ry="12" fill="#fbcfe8" opacity="0.5"/>
  <!-- 奥のサイコロ（ラベンダー） -->
  <g transform="rotate(-12 70 90)">
    <rect x="40" y="62" width="64" height="64" rx="16" fill="#c4b5fd"/>
    <rect x="40" y="62" width="64" height="64" rx="16" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.5"/>
    <circle cx="60" cy="82" r="6" fill="#ffffff"/>
    <circle cx="84" cy="106" r="6" fill="#ffffff"/>
  </g>
  <!-- 手前のサイコロ（ピンク） -->
  <g transform="rotate(10 130 110)">
    <rect x="100" y="84" width="70" height="70" rx="18" fill="#f9a8d4"/>
    <rect x="100" y="84" width="70" height="70" rx="18" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.5"/>
    <!-- 5の目 -->
    <circle cx="118" cy="102" r="6.5" fill="#ffffff"/>
    <circle cx="152" cy="102" r="6.5" fill="#ffffff"/>
    <circle cx="135" cy="119" r="6.5" fill="#ffffff"/>
    <circle cx="118" cy="136" r="6.5" fill="#ffffff"/>
    <circle cx="152" cy="136" r="6.5" fill="#ffffff"/>
  </g>
  <!-- 動きのキラキラ -->
  <path d="M40 40 L43 48 L51 51 L43 54 L40 62 L37 54 L29 51 L37 48 Z" fill="#fde68a"/>
  <circle cx="170" cy="50" r="4" fill="#6ee7b7"/>
  <circle cx="30" cy="120" r="3.5" fill="#c4b5fd"/>
</svg>
