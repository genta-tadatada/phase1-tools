<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- 文字数カウントツール用：原稿用紙＋鉛筆 -->
  <!-- 紙（マス目つき） -->
  <g transform="rotate(-6 92 104)">
    <rect x="42" y="48" width="100" height="116" rx="10" fill="#ffffff"/>
    <rect x="42" y="48" width="100" height="116" rx="10" fill="none" stroke="#fbcfe8" stroke-width="4"/>
    <!-- マス目 -->
    <g stroke="#fde68a" stroke-width="3" stroke-linecap="round">
      <line x1="56" y1="72" x2="128" y2="72"/>
      <line x1="56" y1="92" x2="128" y2="92"/>
      <line x1="56" y1="112" x2="128" y2="112"/>
      <line x1="56" y1="132" x2="108" y2="132"/>
    </g>
    <!-- 数字「123」風の点（カウント表現） -->
    <circle cx="62" cy="64" r="3" fill="#c4b5fd"/>
    <circle cx="72" cy="64" r="3" fill="#6ee7b7"/>
    <circle cx="82" cy="64" r="3" fill="#f9a8d4"/>
  </g>
  <!-- 鉛筆（右下から斜め） -->
  <g transform="rotate(40 140 130)">
    <rect x="128" y="60" width="22" height="92" rx="6" fill="#fde68a"/>
    <rect x="128" y="60" width="22" height="14" fill="#f9a8d4"/>
    <path d="M128 152 L139 172 L150 152 Z" fill="#f6d8b0"/>
    <path d="M133 162 L139 172 L145 162 Z" fill="#8b5cf6"/>
    <line x1="139" y1="74" x2="139" y2="150" stroke="#fbbf3b" stroke-width="3" opacity="0.6"/>
  </g>
  <!-- キラ -->
  <path d="M40 36 L42.5 42 L49 44 L42.5 46 L40 52 L37.5 46 L31 44 L37.5 42 Z" fill="#c4b5fd"/>
</svg>
